name: Build (Java 21 / Maven)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Create Maven settings.xml with required repositories
        run: |
          mkdir -p $HOME/.m2
          cat > $HOME/.m2/settings.xml <<'XML'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <profiles>
              <profile>
                <id>add-dustplanet</id>
                <repositories>
                  <repository>
                    <id>parent</id>
                    <url>https://repo.dustplanet.de/artifactory/bukkit-plugins/</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                  <repository>
                    <id>vault-repo</id>
                    <url>https://repo.dustplanet.de/artifactory/ext-release-local/</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                  <repository>
                    <id>SilkSpawners-Repo</id>
                    <url>https://repo.dustplanet.de/artifactory/libs-release-local/</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                  <repository>
                    <id>dustplanet</id>
                    <url>https://repo.dustplanet.de/artifactory/private/</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>add-dustplanet</activeProfile>
            </activeProfiles>
          </settings>
          XML

      - name: Build with Maven (package)
        run: mvn -B -DskipTests package

      - name: Upload shaded JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: silkspawnersshopaddon-jar
          path: target/*-shaded.jar
