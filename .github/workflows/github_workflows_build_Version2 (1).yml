name: Build (Java 25 / Maven)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build with Maven (package)
        run: mvn -B -DskipTests package

      - name: Upload shaded JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: silkspawnersshopaddon-jar
          path: target/*-shaded.jar